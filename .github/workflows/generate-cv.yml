name: Generate CV Artifacts

on:
  push:
    branches:
      - main
    paths:
      - 'assets/cv.md'
      - 'src/generate.py'
      - 'src/generate_pdf.sh'
      - 'src/commit_push.sh'
      - 'src/pdf-style.css'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate index.md and README.md
        run: python3 src/generate.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate PDF
        run: bash src/generate_pdf.sh

      - name: Commit and Push Changes
        run: bash src/commit_push.sh
